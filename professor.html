<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Professor — Breakout Rooms</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;padding:20px}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#161b22;border:1px solid #30363d;border-radius:12px;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.top-bar h1{font-size:1.3em;color:#58a6ff}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.controls select,.controls button{padding:8px 16px;border-radius:8px;border:1px solid #30363d;background:#21262d;color:#e6edf3;font-size:0.9em;cursor:pointer}
.controls button{font-weight:600}
.btn-green{background:#238636!important;border-color:#238636!important}
.btn-green:hover{background:#2ea043!important}
.btn-red{background:#da3633!important;border-color:#da3633!important}
.btn-red:hover{background:#f85149!important}
.btn-blue{background:#1f6feb!important;border-color:#1f6feb!important}
.btn-blue:hover{background:#388bfd!important}
.tema-bar{text-align:center;padding:12px;background:#161b22;border:1px solid #30363d;border-radius:12px;margin-bottom:20px}
.tema-bar h2{color:#f0883e;font-size:1.1em}
.tema-bar p{color:#8b949e;font-size:0.85em;margin-top:4px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.group-card{background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden}
.group-header{padding:12px 16px;font-weight:700;font-size:1em;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
.group-header .count{background:rgba(255,255,255,0.1);padding:2px 10px;border-radius:12px;font-size:0.8em}
.grupo-alfa .group-header{background:#1B4332;color:#2ECC71}
.grupo-beta .group-header{background:#1A237E;color:#64B5F6}
.grupo-gamma .group-header{background:#4A148C;color:#CE93D8}
.grupo-delta .group-header{background:#BF360C;color:#FF8A65}
.group-challenge{padding:12px 16px;border-bottom:1px solid #30363d;color:#8b949e;font-size:0.85em;line-height:1.5;background:#0d1117}
.group-responses{padding:8px;max-height:400px;overflow-y:auto}
.resp{padding:10px 12px;border-bottom:1px solid #21262d}
.resp:last-child{border-bottom:none}
.resp .name{font-weight:600;color:#58a6ff;font-size:0.85em}
.resp .text{color:#c9d1d9;margin-top:4px;font-size:0.9em;line-height:1.5;white-space:pre-wrap}
.resp .time{color:#484f58;font-size:0.75em;margin-top:4px}
.empty-resp{padding:30px;text-align:center;color:#484f58;font-style:italic}
.status-bar{display:flex;justify-content:center;gap:20px;padding:12px;background:#161b22;border:1px solid #30363d;border-radius:12px;margin-top:20px;flex-wrap:wrap}
.status-item{text-align:center}
.status-item .num{font-size:2em;font-weight:700;color:#58a6ff}
.status-item .label{font-size:0.8em;color:#8b949e}
.qr-link{text-align:center;padding:16px;background:#161b22;border:1px solid #30363d;border-radius:12px;margin-top:16px}
.qr-link a{color:#58a6ff;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="top-bar">
  <h1>📊 Painel do Professor — Breakout Rooms</h1>
  <div class="controls">
    <select id="sel-aula" onchange="changeAula()">
      <option value="1">Aula 1 — O Chamado</option>
      <option value="2">Aula 2 — O Desenvolvimento</option>
      <option value="3">Aula 3 — A Transformação</option>
      <option value="4">Aula 4 — O Legado</option>
    </select>
    <select id="sel-bloco" onchange="changeBloco()">
      <option value="1">Bloco 1</option>
      <option value="2">Bloco 2</option>
      <option value="3">Bloco 3</option>
      <option value="4">Bloco 4</option>
    </select>
    <button class="btn-blue" onclick="loadAll()">🔄 Atualizar</button>
    <button class="btn-red" onclick="resetBloco()">🗑️ Resetar Bloco</button>
    <button class="btn-green" onclick="nextBloco()">▶️ Próximo Bloco</button>
    <button onclick="window.open(`qrcodes.html?aula=${getAula()}`,'_blank')">📱 QR Codes</button>
  </div>
</div>

<div class="tema-bar" id="tema-bar"></div>

<div class="grid" id="grid"></div>

<div class="status-bar" id="status-bar"></div>
<div class="qr-link" id="qr-link"></div>

<script src="breakout-data.js"></script>
<script>
const API = location.origin;

// Keepalive — ping server every 4 min to prevent Render sleep during class
setInterval(() => { fetch(`${API}/health`).catch(() => {}); }, 4 * 60 * 1000);
// Initial wakeup
fetch(`${API}/health`).catch(() => {});
const grupos = ["alfa","beta","gamma","delta"];
const grupoLabels = {alfa:"GRUPO ALFA",beta:"GRUPO BETA",gamma:"GRUPO GAMMA",delta:"GRUPO DELTA"};

function getAula() { return parseInt(document.getElementById("sel-aula").value); }
function getBloco() { return parseInt(document.getElementById("sel-bloco").value); }

function changeAula() { loadAll(); }
function changeBloco() { loadAll(); }

function loadAll() {
  const aula = getAula(), bloco = getBloco();
  const aulaData = BREAKOUT_DATA[aula];
  const blocoData = aulaData?.blocos[bloco];

  // Tema bar
  document.getElementById("tema-bar").innerHTML = blocoData
    ? `<h2>🎯 Bloco ${bloco}: ${blocoData.tema}</h2><p>${aulaData.titulo}</p>`
    : `<h2>Selecione aula e bloco</h2>`;

  // Fetch responses
  fetch(`${API}/api/responses?aula=${aula}&bloco=${bloco}`)
    .then(r => r.json())
    .then(data => renderGrid(data, blocoData))
    .catch(() => renderGrid({}, blocoData));

  // QR link
  document.getElementById("qr-link").innerHTML = `<a href="qrcodes.html?aula=${aula}" target="_blank">📱 Abrir QR Codes da Aula ${aula} para compartilhar com os alunos</a>`;
}

function renderGrid(data, blocoData) {
  let totalResp = 0;
  let html = "";
  grupos.forEach(g => {
    const resps = data[g] || [];
    totalResp += resps.length;
    const challenge = blocoData?.grupos[g] || "";
    html += `
      <div class="group-card grupo-${g}">
        <div class="group-header">${grupoLabels[g]} <span class="count">${resps.length} resposta(s)</span></div>
        <div class="group-challenge">📋 ${challenge}</div>
        <div class="group-responses">
          ${resps.length === 0
            ? '<div class="empty-resp">Aguardando respostas...</div>'
            : resps.map(r => `
              <div class="resp">
                <div class="name">👤 ${r.nome}</div>
                <div class="text">${r.resposta}</div>
                <div class="time">${new Date(r.ts).toLocaleTimeString("pt-BR")}</div>
              </div>
            `).join("")}
        </div>
      </div>
    `;
  });
  document.getElementById("grid").innerHTML = html;
  document.getElementById("status-bar").innerHTML = `
    <div class="status-item"><div class="num">${totalResp}</div><div class="label">Respostas Total</div></div>
    ${grupos.map(g => `<div class="status-item"><div class="num">${(data[g]||[]).length}</div><div class="label">${grupoLabels[g]}</div></div>`).join("")}
  `;
}

async function resetBloco() {
  if (!confirm(`Resetar TODAS as respostas do Bloco ${getBloco()}?\nIsso apaga tudo. Confirma?`)) return;
  await fetch(`${API}/api/reset`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({aula: getAula(), bloco: getBloco()}) });
  loadAll();
}

function nextBloco() {
  const cur = getBloco();
  if (cur < 4) {
    document.getElementById("sel-bloco").value = cur + 1;
    loadAll();
  } else {
    alert("Já está no Bloco 4 (último)!");
  }
}

// SSE
const es = new EventSource(`${API}/api/stream`);
es.onmessage = (e) => {
  const d = JSON.parse(e.data);
  if (d.type === "new_response" || d.type === "reset") { if (d.aula == getAula()) loadAll(); }
};

// Init
loadAll();
</script>
</body>
</html>
